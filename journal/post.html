  .article-body strong { color: var(--cream); font-weight: 600; }
  .article-body a { color: var(--gold); border-bottom: 1px solid var(--gold-20); padding-bottom: 1px; transition: border-color 0.2s ease; }

  .article-body ul, .article-body ol { margin: 8px 0 18px 22px; color: var(--cream-80); font-size: 17px; line-height: 1.75; }

<script type="module">
import { renderMarkdown, escapeHtml } from '../scripts/lib/markdown.mjs';

const SUPABASE_URL = 'https://yrzawkqcifuubtltktbk.supabase.co/rest/v1/journal_posts';
const SUPABASE_ANON = 'sb_publishable_OU38evYLP4E6Kl6TiByOqA_7l-mrxzY';

function getSlug() {
  // URL shape with Vercel rewrite + cleanUrls: /journal/<slug>
  // Also handle /journal/<slug>/ and /journal/<slug>.html for safety.
  const path = window.location.pathname.replace(/\/+$/, '');
  const parts = path.split('/').filter(Boolean);
  // ['journal', '<slug>']  OR  ['journal', '<slug>.html']
  let slug = parts[parts.length - 1] || '';
  if (slug.endsWith('.html')) slug = slug.slice(0, -5);
  // 'post' itself means we landed on the template directly (no rewrite) — fall back to ?slug=
  if (!slug || slug === 'post') {
    const params = new URLSearchParams(window.location.search);
    slug = params.get('slug') || '';
  }
  return slug;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function inferReadMinutes(post) {
  if (Number.isFinite(post.read_minutes) && post.read_minutes > 0) return post.read_minutes;
  const words = (post.body_markdown || '').trim().split(/\s+/).length;
  return Math.max(1, Math.round(words / 220));
}

function renderNotFound(slug) {
  document.title = 'Article not found — The Watch Alley PH';
  document.getElementById('article-root').innerHTML = `
    <div class="article-not-found">
      <h1>We could not find that article.</h1>
      <p>${escapeHtml(slug ? `"${slug}"` : 'No slug')} did not match any published journal post.</p>
      <p><a class="article-back" href="../journal.html">← Back to the Journal</a></p>
    </div>`;
}

function renderArticle(post) {
  const title = post.title || 'Watch Alley Journal';
  const summary = post.summary || '';
  const dateLabel = formatDate(post.published_at);
  const readMin = inferReadMinutes(post);
  const author = post.author || 'The Watch Alley';
  const bodyHtml = renderMarkdown(post.body_markdown || '');

  // Update document head meta for crawlers that execute JS (Google does)
  document.title = `${title} — The Watch Alley PH`;
  setMeta('description', summary);
  setMetaProperty('og:title', title);
  setMetaProperty('og:description', summary);
  if (post.hero_image) setMetaProperty('og:image', post.hero_image);
  const canonical = document.querySelector('link[rel="canonical"]');
  const url = `https://watchalley.ph/journal/${post.slug}`;
  if (canonical) canonical.setAttribute('href', url);
  else {
    const link = document.createElement('link');
    link.rel = 'canonical';
    link.href = url;
    document.head.appendChild(link);
  }

  const tagsHtml = (Array.isArray(post.tags) && post.tags.length)
    ? `<div class="article-tags">${post.tags.map((t) => `<span class="article-tag">${escapeHtml(t)}</span>`).join('')}</div>`
    : '';

  document.getElementById('article-root').innerHTML = `
    <div class="article-eyebrow">${escapeHtml((post.tags && post.tags[0]) || 'Journal')}${dateLabel ? ` · ${escapeHtml(dateLabel)}` : ''}</div>
    <h1 class="article-title">${escapeHtml(title)}</h1>
    <p class="article-meta">By ${escapeHtml(author)} · ${readMin} min read</p>
    ${post.hero_image ? `<figure class="article-hero"><img src="${escapeHtml(post.hero_image)}" alt="${escapeHtml(title)}" /></figure>` : ''}
    <div class="article-body">${bodyHtml}</div>
    ${tagsHtml}
    <a class="article-back" href="../journal.html">← Back to the Journal</a>`;
}

function setMeta(name, value) {
  let el = document.querySelector(`meta[name="${name}"]`);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute('name', name);
    document.head.appendChild(el);
  }
  el.setAttribute('content', value);
}
function setMetaProperty(prop, value) {
  let el = document.querySelector(`meta[property="${prop}"]`);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute('property', prop);
    document.head.appendChild(el);
  }
  el.setAttribute('content', value);
}

async function loadArticle() {
  const slug = getSlug();
  if (!slug) return renderNotFound('');

  const url = new URL(SUPABASE_URL);
  url.searchParams.set('select', 'slug,title,summary,body_markdown,hero_image,tags,author,read_minutes,published_at');
  url.searchParams.set('slug', `eq.${slug}`);
  url.searchParams.set('status', 'eq.published');
  url.searchParams.set('limit', '1');

  try {
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${SUPABASE_ANON}`,
        Accept: 'application/json',
        'Accept-Profile': 'watch_alley',
      },
    });
    if (!res.ok) throw new Error(`Article fetch ${res.status}`);
    const rows = await res.json();
    if (!Array.isArray(rows) || !rows.length) return renderNotFound(slug);
    renderArticle(rows[0]);
  } catch (err) {
    console.error('Article load failed', err);
    renderNotFound(slug);
  }
}

loadArticle();
</script>
