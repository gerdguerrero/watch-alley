<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Kinetic Type</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;0,800;1,400&family=Outfit:wght@300;400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #0a0a0f;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
      }
    </style>
  
<script>
window.__tailwindReady=new Promise(function(resolve){
var loaded=document.readyState==="complete";
var resolved=false;
var observer;
function readTailwindCss(){var styles=document.querySelectorAll("style");for(var i=styles.length-1;i>=0;i--){var text=styles[i].textContent||"";if(text.indexOf("tailwindcss v")!==-1)return text;}return "";}
function finish(){if(resolved||!loaded||!readTailwindCss())return;resolved=true;if(observer)observer.disconnect();resolve(true);}
observer=new MutationObserver(finish);
observer.observe(document.documentElement,{childList:true,subtree:true,characterData:true});
if(loaded){finish();}else{window.addEventListener("load",function(){loaded=true;finish();},{once:true});}
});
</script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2.4/dist/index.global.js" integrity="sha384-v5YF9xS+gLRWdvrQ0u/WRbCkjSIH0NjHIPe8tBL1ZRrmI7PiSH6LLdzs0aAIMCuh" crossorigin="anonymous"></script>
</head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="graphics-layer"
        data-composition-id="main-graphics"
        data-composition-src="compositions/main-graphics.html"
        data-start="0"
        data-duration="15"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
