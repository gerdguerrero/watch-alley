<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%" height="100%">
  <rect width="100%" height="100%" fill="none" />
  <g transform="translate(40, 20)">
    <!-- THE wordmark -->
    <text x="20" y="32" font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="600" fill="#ffffff" letter-spacing="4">THE</text>
    
    <!-- WATCH wordmark -->
    <g transform="translate(0, 48)">
      <!-- W -->
      <text x="20" y="55" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="500" fill="#ffffff" letter-spacing="2">W</text>
      <!-- Caliper A -->
      <g transform="translate(85, -15) scale(0.75)">
        <!-- Curved spring loop at the very top -->
        <path d="M54 22 C50 12 78 12 74 22" fill="none" stroke="#ffffff" stroke-width="2" />
        <!-- Hinge ring -->
        <circle cx="64" cy="24" r="5" fill="none" stroke="#ffffff" stroke-width="3" />
        <!-- Left caliper leg -->
        <path d="M62 27 L48 94 C46 99 44 100 42 100" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" />
        <!-- Right caliper leg -->
        <path d="M66 27 L80 94 C82 99 84 100 86 100" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" />
        <!-- Micro-adjustment threaded rod -->
        <line x1="51" y1="64" x2="77" y2="64" stroke="#ffffff" stroke-width="1.5" />
        <!-- Thumbscrew knob -->
        <rect x="61" y="58" width="6" height="12" rx="1.5" fill="#000000" stroke="#ffffff" stroke-width="1.2" />
      </g>
      <!-- T -->
      <text x="180" y="55" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="500" fill="#ffffff" letter-spacing="2">T</text>
      <!-- C -->
      <text x="235" y="55" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="500" fill="#ffffff" letter-spacing="2">C</text>
      <!-- H -->
      <text x="295" y="55" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="500" fill="#ffffff" letter-spacing="2">H</text>
    </g>

    <!-- ALLEY wordmark -->
    <text x="380" y="103" font-family="'Playfair Display', Georgia, serif" font-size="44" font-weight="500" fill="#ffffff" letter-spacing="6">ALLEY</text>
  </g>
</svg>
