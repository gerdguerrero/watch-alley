<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular deep walnut background -->
  <circle cx="256" cy="256" r="240" fill="#13110f" stroke="#c5a880" stroke-width="12" />
  
  <!-- Outer delicate inner bezel ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#c5a880" stroke-width="2" stroke-dasharray="4 8" opacity="0.4" />
  
  <!-- Caliper A Mark -->
  <g transform="translate(128, 90) scale(3.1)">
    <!-- Curved spring loop at the very top -->
    <path d="M54 22 C50 12 78 12 74 22" fill="none" stroke="#c5a880" stroke-width="2" />
    <!-- Hinge ring -->
    <circle cx="64" cy="24" r="5" fill="none" stroke="#c5a880" stroke-width="3" />
    <!-- Left caliper leg -->
    <path d="M62 27 L48 94 C46 99 44 100 42 100" fill="none" stroke="#c5a880" stroke-width="3.5" stroke-linecap="round" />
    <!-- Right caliper leg -->
    <path d="M66 27 L80 94 C82 99 84 100 86 100" fill="none" stroke="#c5a880" stroke-width="3.5" stroke-linecap="round" />
    <!-- Micro-adjustment threaded rod -->
    <line x1="51" y1="64" x2="77" y2="64" stroke="#c5a880" stroke-width="1.5" />
    <!-- Thumbscrew knob -->
    <rect x="61" y="58" width="6" height="12" rx="1.5" fill="#13110f" stroke="#c5a880" stroke-width="1.2" />
  </g>
</svg>
