<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular deep walnut background -->
  <circle cx="256" cy="256" r="240" fill="#13110f" stroke="#c5a880" stroke-width="12" />
  
  <!-- Outer delicate inner bezel ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#c5a880" stroke-width="2" stroke-dasharray="4 8" opacity="0.6" />
  
  <!-- Minimalist watch indices representing hour markers at 12, 3, 6, 9 -->
  <line x1="256" y1="56" x2="256" y2="72" stroke="#c5a880" stroke-width="4" stroke-linecap="round" />
  <line x1="456" y1="256" x2="440" y2="256" stroke="#c5a880" stroke-width="4" stroke-linecap="round" />
  <line x1="256" y1="456" x2="256" y2="440" stroke="#c5a880" stroke-width="4" stroke-linecap="round" />
  <line x1="56" y1="256" x2="72" y2="256" stroke="#c5a880" stroke-width="4" stroke-linecap="round" />
  
  <!-- Stylized luxury watch hands pointing at 10:10 -->
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="160" y2="180" stroke="#c5a880" stroke-width="8" stroke-linecap="round" />
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="360" y2="160" stroke="#c5a880" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center pinion cap -->
  <circle cx="256" cy="256" r="16" fill="#13110f" stroke="#c5a880" stroke-width="4" />
  <circle cx="256" cy="256" r="6" fill="#c5a880" />

  <!-- Monogram letters 'W' and 'A' stylized and overlaid at the bottom -->
  <text x="256" y="375" font-family="'Playfair Display', Georgia, serif" font-size="72" font-style="italic" font-weight="500" fill="#c5a880" text-anchor="middle" letter-spacing="2">W·A</text>
</svg>
