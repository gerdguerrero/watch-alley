<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sold Archive — The Watch Alley PH</title>
<meta name="description" content="A running record of watches sold through The Watch Alley. Browse what we've placed; message us when a similar reference comes around." />
<meta name="theme-color" content="#070b14" />
<link rel="canonical" href="https://watchalley.ph/sold" />
<meta property="og:type" content="website">
<meta property="og:title" content="Sold Archive — The Watch Alley PH">
<meta property="og:description" content="A running record of watches sold through The Watch Alley.">
<meta property="og:url" content="https://watchalley.ph/sold">
<link rel="icon" type="image/jpeg" href="/assets/logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Petrona:ital,wght@0,400..700;1,400..700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles/trust-page.css" />
<style>
  /* Sold-archive-specific styles. Tokens (--gold etc.) come from trust-page.css.
     Markup mirrors index.html's #sold-archive so the visual language is identical. */
  main.sold-page {
    flex: 1;
    padding: clamp(48px, 8vw, 96px) clamp(20px, 4vw, 80px);
  }
  .sold-archive-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }
  .sold-archive-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .sold-archive-title {
    font-family: 'Petrona', Georgia, serif;
    font-size: clamp(28px, 4vw, 48px);
    color: var(--cream);
    margin: 8px 0 0 0;
  }
  .sold-archive-title em { font-style: italic; color: var(--gold); }
  .sold-archive-blurb {
    max-width: 540px;
    color: var(--cream-60);
    font-size: 13px;
    line-height: 1.65;
  }
  .sold-archive-grid {
    display: flex;
    flex-direction: column;
    margin-top: 8px;
    border-top: 1px solid var(--gold-20);
  }
  .sold-card {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center;
    gap: clamp(16px, 3vw, 28px);
    padding: clamp(18px, 2.5vw, 24px) 0;
    border-bottom: 1px solid var(--gold-20);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s ease;
  }
  .sold-card:hover { background: rgba(201, 162, 75, 0.04); color: inherit; }
  .sold-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }
  .sold-card-img {
    width: 56px;
    height: 56px;
    overflow: hidden;
    filter: grayscale(0.65);
    opacity: 0.85;
    flex-shrink: 0;
  }
  .sold-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .sold-card-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .sold-card-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream-60);
  }
  .sold-card-name {
    font-family: 'Petrona', Georgia, serif;
    font-size: clamp(18px, 1.6vw, 22px);
    color: var(--cream);
    line-height: 1.25;
  }
  .sold-card-figure {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    text-align: right;
  }
  .sold-card-price {
    font-family: 'Petrona', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(16px, 1.6vw, 20px);
    color: var(--gold);
    font-variant-numeric: oldstyle-nums tabular-nums;
  }
  .sold-card-when {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream-60);
  }
  .sold-card-empty {
    padding: 32px 0;
    color: var(--cream-60);
    font-family: 'Spectral', Georgia, serif;
    font-style: italic;
    font-size: 14px;
  }
  .sold-back {
    display: inline-block;
    margin-top: clamp(36px, 6vw, 56px);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--cream-60);
  }
  .sold-back:hover { color: var(--gold); }
  @media (max-width: 600px) {
    .sold-card { grid-template-columns: 48px 1fr; row-gap: 8px; }
    .sold-card-img { width: 48px; height: 48px; }
    .sold-card-figure {
      grid-column: 2 / -1;
      flex-direction: row;
      justify-content: space-between;
      align-items: baseline;
      text-align: left;
      width: 100%;
    }
  }
</style>
</head>
<body>

<nav id="main-nav">
  <div class="nav-links">
    <a href="/available">Available</a>
    <a href="/journal">Journal</a>
    <a href="/sold" class="active">Sold Archive</a>
    <a href="/#contact">Visit</a>
  </div>
  <a href="/" class="nav-logo" aria-label="The Watch Alley — home">
    <img src="/assets/logo.jpg" alt="" width="50" height="50" decoding="async">
    <span class="nav-logo-text">The Watch Alley</span>
  </a>
  <div class="nav-right"></div>
</nav>

<main class="sold-page">
  <header class="sold-archive-header">
    <div>
      <div class="sold-archive-eyebrow">SOLD ARCHIVE</div>
      <h1 class="sold-archive-title">Recently <em>honored.</em></h1>
    </div>
    <p class="sold-archive-blurb">A running record of pieces that found a home through The Watch Alley. If you missed one, message us — similar references come around.</p>
  </header>

  <div class="sold-archive-grid" id="sold-archive-grid" aria-live="polite">
    <div class="sold-card-empty">Loading archive…</div>
  </div>

  <a class="sold-back" href="/">← Back to The Watch Alley</a>
</main>

<script>
  // Standalone sold-archive page. Fetches the same Supabase inventory the
  // homepage uses, filters status='sold', and renders one ledger row per
  // piece. Each row links to the canonical /watch/:slug page (already
  // statically rendered with per-watch OG/meta), so no modal is needed here.
  const SUPABASE_ENDPOINT = 'https://yrzawkqcifuubtltktbk.supabase.co/rest/v1/watches';
  const SUPABASE_ANON_KEY = 'sb_publishable_OU38evYLP4E6Kl6TiByOqA_7l-mrxzY';
  const FALLBACK_URL = '/data/watches.json';
  const COLUMNS = [
    'slug', 'brand', 'reference', 'name', 'status',
    'primary_image', 'images', 'sold_at', 'sold_price', 'published',
  ].join(',');

  const grid = document.getElementById('sold-archive-grid');

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  function formatSoldMonth(soldAt) {
    if (typeof soldAt !== 'string' || !/^\d{4}-\d{2}/.test(soldAt)) return '';
    const [year, month] = soldAt.split('-');
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const idx = Math.max(0, Math.min(11, Number(month) - 1));
    return `${months[idx]} ${year}`;
  }

  function formatSoldPrice(soldPrice) {
    const value = Number(soldPrice);
    if (!Number.isFinite(value) || value <= 0) return '';
    return `₱ ${value.toLocaleString('en-PH', { maximumFractionDigits: 0 })}`;
  }

  function normalizeSupabaseRow(row) {
    const images = Array.isArray(row.images) ? row.images : [];
    return {
      slug: row.slug,
      brand: row.brand,
      reference: row.reference,
      name: row.name,
      status: row.status,
      primaryImage: row.primary_image || images[0] || '',
      soldAt: row.sold_at || '',
      soldPrice: row.sold_price,
    };
  }

  function renderRow(watch) {
    const soldMonth = formatSoldMonth(watch.soldAt);
    const priceLabel = formatSoldPrice(watch.soldPrice);
    return `
      <a class="sold-card" href="/watch/${escapeHtml(watch.slug)}" aria-label="Open archived details for ${escapeHtml(watch.name)}">
        <div class="sold-card-img" aria-hidden="true">
          ${watch.primaryImage ? `<img loading="lazy" decoding="async" src="${escapeHtml(watch.primaryImage)}" alt="">` : ''}
        </div>
        <div class="sold-card-body">
          <div class="sold-card-meta">${escapeHtml(watch.brand)}${watch.reference ? ' · ' + escapeHtml(watch.reference) : ''}</div>
          <div class="sold-card-name">${escapeHtml(watch.name)}</div>
        </div>
        <div class="sold-card-figure">
          ${priceLabel ? `<span class="sold-card-price">${escapeHtml(priceLabel)}</span>` : ''}
          ${soldMonth ? `<span class="sold-card-when">Placed ${escapeHtml(soldMonth)}</span>` : ''}
        </div>
      </a>`;
  }

  function renderGrid(watches) {
    const sold = watches.filter(w => w.status === 'sold');
    if (!sold.length) {
      grid.innerHTML = `<div class="sold-card-empty">Once pieces find their next collector, they will appear here.</div>`;
      return;
    }
    sold.sort((a, b) => String(b.soldAt || '').localeCompare(String(a.soldAt || '')));
    grid.innerHTML = sold.map(renderRow).join('');
  }

  async function loadFromSupabase() {
    const url = new URL(SUPABASE_ENDPOINT);
    url.searchParams.set('select', COLUMNS);
    url.searchParams.set('status', 'eq.sold');
    url.searchParams.set('published', 'eq.true');
    url.searchParams.set('order', 'sold_at.desc.nullslast,sold_price.desc.nullslast');
    const res = await fetch(url, {
      cache: 'no-store',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        Accept: 'application/json',
      },
    });
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
    const rows = await res.json();
    return rows.map(normalizeSupabaseRow);
  }

  async function loadFromFallback() {
    const res = await fetch(FALLBACK_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Fallback ${res.status}`);
    const data = await res.json();
    return Array.isArray(data.watches) ? data.watches : [];
  }

  (async () => {
    try {
      renderGrid(await loadFromSupabase());
    } catch (err) {
      console.warn('Sold archive: live fetch failed, using fallback', err);
      try {
        renderGrid(await loadFromFallback());
      } catch (innerErr) {
        console.error('Sold archive: fallback also failed', innerErr);
        grid.innerHTML = `<div class="sold-card-empty">Sold archive unavailable right now. Please refresh.</div>`;
      }
    }
  })();

  // Sticky-nav shrink on scroll (matches homepage behavior).
  const nav = document.getElementById('main-nav');
  if (nav) {
    const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 8);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
</script>

</body>
</html>
